version: '3.8'

services:
  ssl-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssl-certificate-monitor
    restart: unless-stopped
    ports:
      - "3031:3031"
    environment:
      - PORT=3031
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL}
